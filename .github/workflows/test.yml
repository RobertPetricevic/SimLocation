name: Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: SimLocation
        run: xcodegen generate

      - name: Run tests
        working-directory: SimLocation
        run: |
          xcodebuild test \
            -project SimLocation.xcodeproj \
            -scheme SimLocation \
            -destination 'platform=macOS' \
            -only-testing:SimLocationTests
