name: SimLocation
options:
  bundleIdPrefix: com.simlocation
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

targets:
  SimLocation:
    type: application
    platform: macOS
    sources:
      - SimLocation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simlocation.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: ""
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: "NO"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
