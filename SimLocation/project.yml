name: SimLocation
options:
  bundleIdPrefix: com.simlocation
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.0"

targets:
  SimLocation:
    type: application
    platform: macOS
    sources:
      - SimLocation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.simlocation.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: SimLocation/SimLocation.entitlements
        CODE_SIGN_IDENTITY: "-"
        ENABLE_APP_SANDBOX: "NO"
        ENABLE_HARDENED_RUNTIME: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_NSHumanReadableCopyright: "© 2026 Robert Petricevic. All rights reserved."

  SimLocationTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SimLocationTests
    dependencies:
      - target: SimLocation
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SimLocation.app/Contents/MacOS/SimLocation"
        BUNDLE_LOADER: "$(TEST_HOST)"
